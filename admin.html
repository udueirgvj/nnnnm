<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المالك - عيادة الدكتور علي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2b2b52, #4a47a3);
            min-height: 100vh;
            padding: 15px;
            background-size: cover;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 25px;
        }
        h1 {
            color: #4a47a3;
            text-align: center;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #6c5ce7;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #a8e6cf;
            padding-bottom: 8px;
        }
        button {
            background: linear-gradient(45deg, #6c5ce7, #a8e6cf);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
        }
        .danger-btn { background: linear-gradient(45deg, #e74c3c, #f39c12); }
        .success-btn { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            margin: 8px 0;
        }
        .preview-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            margin-top: 10px;
        }
        .close-btn {
            position: absolute;
            left: 15px;
            top: 15px;
            background: #e74c3c;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .appointments-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }
        .appointment-item {
            background: #ecf0f1;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            font-size: 0.8em;
        }
        .appointment-item.booked {
            background: #d4edda;
        }
        .link-section {
            background: #f0f4ff;
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }
        .micro-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.5rem;
            color: #aaa;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        .micro-footer a {
            color: #999;
            margin: 0 2px;
            font-size: 0.6rem;
        }
        .micro-footer i {
            font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1><i class="fas fa-crown"></i> لوحة المالك</h1>

        <div class="grid">
            <div class="card">
                <h3><i class="fas fa-hashtag"></i> عدد الحجوزات</h3>
                <button onclick="changeMax()">تغيير العدد</button>
                <p>العدد الحالي: <strong id="currentMax">17</strong></p>
            </div>
            <div class="card">
                <h3><i class="fas fa-image"></i> الخلفية</h3>
                <input type="file" id="bgUpload" accept="image/*" onchange="uploadBg(event)">
                <button onclick="resetBg()" class="danger-btn">إعادة الافتراضي</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-bullhorn"></i> رسالة</h3>
                <textarea id="announcementInput" rows="2" placeholder="رسالة للمستخدمين..."></textarea>
                <button onclick="saveAnnouncement()" class="success-btn">حفظ</button>
                <button onclick="deleteAnnouncement()" class="danger-btn">حذف</button>
                <div id="announcementPreview" class="preview-box" style="display: none;">
                    <span class="close-btn" onclick="deleteAnnouncement()">×</span>
                    <p id="announcementText"></p>
                </div>
            </div>
            <div class="card">
                <h3><i class="fas fa-link"></i> رابط المالك</h3>
                <div id="adminLink" style="direction:ltr; font-size:0.8em; word-break:break-all;">جاري التحميل...</div>
                <button onclick="copyAdminLink()">نسخ الرابط</button>
            </div>
        </div>

        <div class="card">
            <h3>الحجوزات الحالية</h3>
            <div id="appointmentsList" class="appointments-list"></div>
        </div>

        <div class="link-section">
            <h3>باركود صفحة الحجز</h3>
            <div id="qrcode"></div>
        </div>

        <!-- تذييل صغير جداً للمالك -->
        <div class="micro-footer">
            <div>
                <a href="https://www.facebook.com/share/19RMEicYip/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://t.me/eieici" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://wa.me/9647876459282" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
            <div>• • •</div>
            <div>مطور الصفحة</div>
        </div>
    </div>

    <script>
        const APPOINTMENTS_KEY = 'dr_ali_appointments';
        const MAX_APPOINTMENTS_KEY = 'dr_ali_max';
        const BACKGROUND_KEY = 'dr_ali_background';
        const ANNOUNCEMENT_KEY = 'dr_ali_announcement';

        (function init() {
            updateMaxDisplay();
            loadAnnouncementPreview();
            updateAppointmentsList();
            generateQR();
            displayAdminLink();
            loadBackground();
        })();

        function loadBackground() {
            const bg = localStorage.getItem(BACKGROUND_KEY);
            if (bg) document.body.style.backgroundImage = `url('${bg}')`;
        }

        function getMax() {
            return parseInt(localStorage.getItem(MAX_APPOINTMENTS_KEY)) || 17;
        }

        function updateMaxDisplay() {
            document.getElementById('currentMax').textContent = getMax();
        }

        function changeMax() {
            let current = getMax();
            let newMax = prompt('العدد الجديد:', current);
            if (!newMax) return;
            newMax = parseInt(newMax);
            if (newMax < 1) return;

            let appointments = JSON.parse(localStorage.getItem(APPOINTMENTS_KEY)) || [];
            const bookedCount = appointments.filter(a => a !== null).length;
            if (newMax < bookedCount) {
                alert(`يوجد ${bookedCount} حجز، لا يمكن التخفيض`);
                return;
            }

            if (newMax > appointments.length) {
                for (let i = appointments.length; i < newMax; i++) appointments.push(null);
            } else {
                appointments = appointments.slice(0, newMax);
            }

            localStorage.setItem(MAX_APPOINTMENTS_KEY, newMax);
            localStorage.setItem(APPOINTMENTS_KEY, JSON.stringify(appointments));
            updateMaxDisplay();
            updateAppointmentsList();
        }

        function uploadBg(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(BACKGROUND_KEY, e.target.result);
                document.body.style.backgroundImage = `url('${e.target.result}')`;
            };
            reader.readAsDataURL(file);
        }

        function resetBg() {
            localStorage.removeItem(BACKGROUND_KEY);
            document.body.style.backgroundImage = '';
        }

        function saveAnnouncement() {
            const text = document.getElementById('announcementInput').value.trim();
            if (text) {
                localStorage.setItem(ANNOUNCEMENT_KEY, text);
                loadAnnouncementPreview();
                document.getElementById('announcementInput').value = '';
            }
        }

        function deleteAnnouncement() {
            localStorage.removeItem(ANNOUNCEMENT_KEY);
            loadAnnouncementPreview();
        }

        function loadAnnouncementPreview() {
            const text = localStorage.getItem(ANNOUNCEMENT_KEY);
            const previewDiv = document.getElementById('announcementPreview');
            const textP = document.getElementById('announcementText');
            if (text) {
                textP.textContent = text;
                previewDiv.style.display = 'block';
            } else {
                previewDiv.style.display = 'none';
            }
        }

        function updateAppointmentsList() {
            const stored = localStorage.getItem(APPOINTMENTS_KEY);
            let appointments = stored ? JSON.parse(stored) : [];
            const max = getMax();
            if (appointments.length < max) {
                for (let i = appointments.length; i < max; i++) appointments.push(null);
                localStorage.setItem(APPOINTMENTS_KEY, JSON.stringify(appointments));
            }
            const container = document.getElementById('appointmentsList');
            container.innerHTML = '';
            for (let i = 0; i < max; i++) {
                const div = document.createElement('div');
                div.className = 'appointment-item' + (appointments[i] ? ' booked' : '');
                div.innerHTML = `${i+1}<br>${appointments[i] || '______'}`;
                container.appendChild(div);
            }
        }

        function generateQR() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            const userUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            const qr = qrcode(0, 'M');
            qr.addData(userUrl);
            qr.make();
            qrContainer.innerHTML = qr.createImgTag(4);
        }

        function displayAdminLink() {
            document.getElementById('adminLink').textContent = window.location.href;
        }

        function copyAdminLink() {
            navigator.clipboard.writeText(window.location.href).then(() => alert('تم النسخ!'));
        }
    </script>
</body>
</html>
