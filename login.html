<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سوبركي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { max-width: 400px; width: 100%; background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0047ab; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #0047ab; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; }
        .toggle-link { text-align: center; margin-top: 20px; color: #0047ab; cursor: pointer; }
        #message { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>سوبركي</h1>
        <div id="login-section">
            <h2>تسجيل الدخول</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <button type="submit">دخول</button>
            </form>
            <p class="toggle-link" id="show-signup">ليس لديك حساب؟ إنشاء حساب جديد</p>
        </div>
        <div id="signup-section" style="display:none;">
            <h2>إنشاء حساب جديد</h2>
            <form id="signup-form">
                <input type="text" id="signup-name" placeholder="الاسم الكامل" required>
                <input type="email" id="signup-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="signup-password" placeholder="كلمة المرور" required>
                <button type="submit">إنشاء حساب</button>
            </form>
            <p class="toggle-link" id="show-login">لديك حساب بالفعل؟ تسجيل الدخول</p>
        </div>
        <div id="message"></div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('show-signup').addEventListener('click', () => {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'block';
        });
        document.getElementById('show-login').addEventListener('click', () => {
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        // إنشاء حساب
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                // رصيد صفر
                await setDoc(doc(db, 'users', user.uid), {
                    fullName: name,
                    email: email,
                    balance: 0,
                    createdAt: new Date().toISOString()
                });
                sessionStorage.setItem('userData', JSON.stringify({ fullName: name, balance: 0 }));
                document.getElementById('message').innerHTML = '<span style="color:green;">تم إنشاء الحساب، جاري التوجيه...</span>';
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (error) {
                document.getElementById('message').innerHTML = `<span style="color:red;">خطأ: ${error.message}</span>`;
            }
        });

        // تسجيل الدخول
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    sessionStorage.setItem('userData', JSON.stringify(userSnap.data()));
                }
                window.location.href = 'index.html';
            } catch (error) {
                document.getElementById('message').innerHTML = `<span style="color:red;">خطأ: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
