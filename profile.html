<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - سوبركي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="user-info">
                <i class="fas fa-arrow-right" onclick="history.back()"></i>
                <h2>حسابي</h2>
            </div>
            <div class="notifications">
                <i class="fas fa-sign-out-alt" id="logout-btn"></i>
            </div>
        </header>

        <div style="padding:20px; text-align:center;">
            <i class="fas fa-user-circle" style="font-size:80px; color:#0047ab;"></i>
            <h3 id="profile-name">أحمد محمد</h3>
            <p id="profile-email">example@domain.com</p>
        </div>

        <div style="padding:20px;">
            <div style="background:#f8f9fa; border-radius:16px; padding:20px;">
                <h4>معلومات الحساب</h4>
                <p><strong>الرصيد الحالي:</strong> <span id="profile-balance">0</span> د.ع</p>
                <p><strong>تاريخ الانضمام:</strong> <span id="join-date">2025-01-01</span></p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="wallet.html" class="nav-item">
                <i class="fas fa-wallet"></i>
                <span>المحفظة</span>
            </a>
            <a href="transfer.html" class="nav-item">
                <i class="fas fa-exchange-alt"></i>
                <span>تحويل</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>حسابي</span>
            </a>
        </nav>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { checkAuth, logout } from './js/app.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        checkAuth();
        document.getElementById('logout-btn').addEventListener('click', logout);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('profile-name').textContent = data.fullName;
                    document.getElementById('profile-email').textContent = data.email;
                    document.getElementById('profile-balance').textContent = data.balance.toLocaleString();
                    document.getElementById('join-date').textContent = new Date(data.createdAt).toLocaleDateString('ar-IQ');
                }
            }
        });
    </script>
</body>
</html>
