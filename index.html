<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سوبركي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: Arial; }
        .login-container { max-width: 400px; width: 100%; background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0047ab; text-align: center; margin-bottom: 30px; }
        .tab-bar { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; color: #777; font-weight: bold; }
        .tab.active { color: #0047ab; border-bottom: 2px solid #0047ab; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #0047ab; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; margin: 5px 0; }
        .toggle-link { text-align: center; margin-top: 20px; color: #0047ab; cursor: pointer; }
        #message, #phone-message { margin-top: 20px; text-align: center; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>سوبركي</h1>
        
        <!-- علامات التبويب -->
        <div class="tab-bar">
            <div class="tab active" id="tab-email">بريد إلكتروني</div>
            <div class="tab" id="tab-phone">رقم هاتف</div>
        </div>

        <!-- قسم تسجيل الدخول بالبريد الإلكتروني -->
        <div id="email-section" class="form-section active">
            <div id="login-section">
                <h2>تسجيل الدخول</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                    <input type="password" id="login-password" placeholder="كلمة المرور" required>
                    <button type="submit">دخول</button>
                </form>
                <p class="toggle-link" id="show-signup">ليس لديك حساب؟ إنشاء حساب جديد</p>
            </div>
            <div id="signup-section" style="display:none;">
                <h2>إنشاء حساب جديد</h2>
                <form id="signup-form">
                    <input type="text" id="signup-name" placeholder="الاسم الكامل" required>
                    <input type="email" id="signup-email" placeholder="البريد الإلكتروني" required>
                    <input type="password" id="signup-password" placeholder="كلمة المرور" required>
                    <button type="submit">إنشاء حساب</button>
                </form>
                <p class="toggle-link" id="show-login">لديك حساب بالفعل؟ تسجيل الدخول</p>
            </div>
            <div id="message"></div>
        </div>

        <!-- قسم تسجيل الدخول برقم الهاتف -->
        <div id="phone-section" class="form-section">
            <h2>تسجيل الدخول برقم الهاتف</h2>
            <div id="phone-login-section">
                <input type="tel" id="phone-number" placeholder="رقم الهاتف (مثال: 9647XXXXXXXX)" value="+964">
                <button id="send-code-btn">إرسال رمز التحقق</button>
            </div>
            <div id="verify-section" style="display:none;">
                <input type="text" id="verification-code" placeholder="أدخل رمز التحقق">
                <button id="verify-code-btn">تحقق وتسجيل الدخول</button>
            </div>
            <div id="phone-message"></div>
            <p class="toggle-link" id="switch-to-email">تسجيل الدخول بالبريد الإلكتروني</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات Firebase - تأكد من صحتها
        const firebaseConfig = {
            apiKey: "AIzaSyB6NgRD22IG5l2qQ0O-299N1fOjTPNcVF8",
            authDomain: "tbbbbt-90f6e.firebaseapp.com",
            projectId: "tbbbbt-90f6e",
            storageBucket: "tbbbbt-90f6e.firebasestorage.app",
            messagingSenderId: "65865503138",
            appId: "1:65865503138:web:0ed5179a8753fad82322fb",
            measurementId: "G-1R49BFWK7V"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // التحقق من أن Firebase يعمل (اختياري)
        console.log("Firebase initialized with project:", firebaseConfig.projectId);

        // عناصر واجهة المستخدم
        const tabEmail = document.getElementById('tab-email');
        const tabPhone = document.getElementById('tab-phone');
        const emailSection = document.getElementById('email-section');
        const phoneSection = document.getElementById('phone-section');
        const phoneLoginSection = document.getElementById('phone-login-section');
        const verifySection = document.getElementById('verify-section');
        const sendCodeBtn = document.getElementById('send-code-btn');
        const verifyCodeBtn = document.getElementById('verify-code-btn');
        const phoneNumberInput = document.getElementById('phone-number');
        const verificationCodeInput = document.getElementById('verification-code');
        const phoneMessage = document.getElementById('phone-message');
        const messageDiv = document.getElementById('message');

        let confirmationResult = null;

        // التبديل بين علامات التبويب
        tabEmail.addEventListener('click', () => {
            tabEmail.classList.add('active');
            tabPhone.classList.remove('active');
            emailSection.classList.add('active');
            phoneSection.classList.remove('active');
        });
        tabPhone.addEventListener('click', () => {
            tabPhone.classList.add('active');
            tabEmail.classList.remove('active');
            phoneSection.classList.add('active');
            emailSection.classList.remove('active');
        });
        document.getElementById('switch-to-email').addEventListener('click', (e) => {
            e.preventDefault();
            tabEmail.click();
        });

        // إظهار/إخفاء نموذج إنشاء حساب
        document.getElementById('show-signup').addEventListener('click', () => {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'block';
        });
        document.getElementById('show-login').addEventListener('click', () => {
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        // ==================== البريد الإلكتروني ====================
        // إنشاء حساب جديد
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                // تخزين بيانات إضافية في Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    fullName: name,
                    email: email,
                    balance: 0,
                    createdAt: new Date().toISOString()
                });
                sessionStorage.setItem('userData', JSON.stringify({ fullName: name, balance: 0 }));
                messageDiv.innerHTML = '<span class="success">تم إنشاء الحساب، جاري التوجيه...</span>';
                setTimeout(() => window.location.href = 'home.html', 2000);
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    messageDiv.innerHTML = '<span class="error">⚠️ هذا البريد مستخدم بالفعل. <a href="#" id="go-to-login">تسجيل الدخول</a></span>';
                    document.getElementById('go-to-login')?.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.getElementById('signup-section').style.display = 'none';
                        document.getElementById('login-section').style.display = 'block';
                    });
                } else if (error.code === 'auth/configuration-not-found') {
                    messageDiv.innerHTML = '<span class="error">❌ خطأ في تهيئة Firebase. تأكد من تفعيل Email/Password في Firebase Console.</span>';
                } else {
                    messageDiv.innerHTML = `<span class="error">خطأ: ${error.message}</span>`;
                }
            }
        });

        // تسجيل الدخول بالبريد الإلكتروني
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    sessionStorage.setItem('userData', JSON.stringify(userSnap.data()));
                }
                window.location.href = 'home.html';
            } catch (error) {
                console.error(error);
                messageDiv.innerHTML = `<span class="error">خطأ: ${error.message}</span>`;
            }
        });

        // ==================== رقم الهاتف ====================
        // إعداد reCAPTCHA
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'send-code-btn', { 'size': 'invisible' });

        sendCodeBtn.addEventListener('click', async () => {
            const phoneNumber = phoneNumberInput.value;
            if (!phoneNumber) {
                phoneMessage.innerHTML = '<span class="error">الرجاء إدخال رقم الهاتف</span>';
                return;
            }
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                phoneMessage.innerHTML = '<span class="success">تم إرسال الرمز. تحقق من هاتفك.</span>';
                phoneLoginSection.style.display = 'none';
                verifySection.style.display = 'block';
            } catch (error) {
                console.error(error);
                phoneMessage.innerHTML = `<span class="error">خطأ: ${error.message}</span>`;
            }
        });

        verifyCodeBtn.addEventListener('click', async () => {
            const code = verificationCodeInput.value;
            if (!code) {
                phoneMessage.innerHTML = '<span class="error">الرجاء إدخال الرمز</span>';
                return;
            }
            try {
                const result = await confirmationResult.confirm(code);
                const user = result.user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        fullName: user.phoneNumber || 'مستخدم',
                        email: user.email || user.phoneNumber,
                        phone: user.phoneNumber,
                        balance: 0,
                        createdAt: new Date().toISOString()
                    });
                    sessionStorage.setItem('userData', JSON.stringify({ fullName: user.phoneNumber, balance: 0 }));
                } else {
                    sessionStorage.setItem('userData', JSON.stringify(userSnap.data()));
                }
                window.location.href = 'home.html';
            } catch (error) {
                console.error(error);
                phoneMessage.innerHTML = `<span class="error">خطأ: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
