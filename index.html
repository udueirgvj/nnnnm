<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوبركي - الرئيسية</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- الشريط العلوي -->
        <header class="header">
            <div class="user-info">
                <i class="fas fa-bars menu-icon"></i>
                <div>
                    <p class="welcome">مرحباً بك 👋</p>
                    <h3 class="user-name">أحمد محمد</h3>
                </div>
            </div>
            <div class="notifications">
                <i class="fas fa-bell"></i>
                <i class="fas fa-sign-out-alt" id="logout-btn" style="margin-right: 15px; cursor:pointer;"></i>
            </div>
        </header>

        <!-- بطاقة الرصيد -->
        <div class="balance-card">
            <div class="balance-header">
                <span>الرصيد الحالي</span>
                <i class="fas fa-eye" id="toggle-balance"></i>
            </div>
            <div class="balance-amount">0 <span>د.ع</span></div>
            <div class="balance-footer">
                <div class="balance-item">
                    <span>آخر إيداع</span>
                    <strong id="last-deposit">+ 0</strong>
                </div>
                <div class="balance-item">
                    <span>آخر سحب</span>
                    <strong id="last-withdraw">- 0</strong>
                </div>
            </div>
        </div>

        <!-- شبكة الخدمات - أيقونة "شحن" توجه إلى deposit.html -->
        <div class="services-grid">
            <a href="deposit.html" class="service-item">
                <i class="fas fa-arrow-down"></i>
                <span>شحن</span>
            </a>
            <a href="bills.html" class="service-item">
                <i class="fas fa-file-invoice"></i>
                <span>فواتير</span>
            </a>
            <a href="transfer.html" class="service-item">
                <i class="fas fa-exchange-alt"></i>
                <span>تحويل</span>
            </a>
            <a href="more.html" class="service-item">
                <i class="fas fa-ellipsis-h"></i>
                <span>المزيد</span>
            </a>
            <a href="cards.html" class="service-item">
                <i class="fas fa-credit-card"></i>
                <span>بطاقات</span>
            </a>
            <a href="qr.html" class="service-item">
                <i class="fas fa-qrcode"></i>
                <span>QR مسح</span>
            </a>
        </div>

        <!-- آخر المعاملات (يمكن جلبها من Firestore لاحقاً) -->
        <div class="transactions">
            <div class="section-header">
                <h3>آخر المعاملات</h3>
                <a href="#">عرض الكل</a>
            </div>
            <ul class="transactions-list" id="transactions-list">
                <!-- سيتم ملؤها بـ js لاحقاً -->
                <li class="transaction-item">
                    <i class="fas fa-arrow-down received"></i>
                    <div class="transaction-details">
                        <span class="transaction-name">تحويل وارد من علي</span>
                        <span class="transaction-date">اليوم، 10:30 ص</span>
                    </div>
                    <span class="transaction-amount positive">+ 75,000</span>
                </li>
                <li class="transaction-item">
                    <i class="fas fa-arrow-up sent"></i>
                    <div class="transaction-details">
                        <span class="transaction-name">دفع فاتورة كهرباء</span>
                        <span class="transaction-date">أمس، 8:15 م</span>
                    </div>
                    <span class="transaction-amount negative">- 120,000</span>
                </li>
            </ul>
        </div>

        <!-- القائمة السفلية -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="wallet.html" class="nav-item">
                <i class="fas fa-wallet"></i>
                <span>المحفظة</span>
            </a>
            <a href="transfer.html" class="nav-item">
                <i class="fas fa-exchange-alt"></i>
                <span>تحويل</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>حسابي</span>
            </a>
        </nav>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { checkAuth, displayUserInfo, logout } from './js/app.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        checkAuth();
        displayUserInfo();

        document.getElementById('logout-btn').addEventListener('click', logout);

        // إظهار/إخفاء الرصيد
        let balanceHidden = false;
        document.getElementById('toggle-balance').addEventListener('click', function() {
            const balanceEl = document.querySelector('.balance-amount');
            if (balanceHidden) {
                balanceEl.style.filter = 'none';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            } else {
                balanceEl.style.filter = 'blur(5px)';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            }
            balanceHidden = !balanceHidden;
        });

        // تحديث آخر إيداع وسحب (يمكن لاحقاً من Firestore)
        // يمكن الاستماع لتغييرات الرصاص وعرض آخر معاملة
    </script>
</body>
</html>
